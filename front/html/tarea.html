<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarreas</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="notas.html">Agregar Nota</a></li>
            </ul>
        </aside>
        <main class="content_principal">
            <h1 class="titulo">Tareas</h1>
            <form class="datos">
                <div>
                    <label for="tarea">Tarea
                        
                    </label>
                    <input type="text" required id="tarea" placeholder="Ingrese una tarea">
                </div>
                <div>
                    <label for="tipo">Tipo de pendiente</label>
                    <select id="tipo">
                        <option value="Urgente">Urgente</option>
                        <option value="Postergable">Postergable</option>
                        <option value="Pronto ">Pronto </option>
                    </select>
                </div>
                <div>
                    <label for="fecha">Fecha</label>
                    <input type="date" id="fecha" required>
                </div>


                <button type="submit" class="btn-guardar">Guardar</button>

            </form>

            <section class="tareas-cargadas">
                <h1>Tareas</h1>
                <table>
                    <thead>
                        <tr>
                            <th>Id</th>
                            <th>Tarea</th>
                            <th>Tipo de pendiente</th>
                            <th>Fecha</th>
                            <th>Eliminar</th>
                            <th>Editar</th>
                        </tr>
                    </thead>
                    <tbody id="contenedor">

                    </tbody>

                </table>
            </section>

            <div id="modal-editar">
                <label for="edit-tarea">Tarea</label>
                <input id="edit-tarea">
                <!-- <input id="edit-tipo"> -->
                 <label for="edit-tipo">Tipo de Pendiente</label>
                <select id="edit-tipo">
                    <option value="Urgente">Urgente</option>
                    <option value="Postergable">Postergable</option>
                    <option value="Pronto ">Pronto </option>
                </select>
                <label for="edit-fecha">Fecha</label>
                <input id="edit-fecha" type="date">
                <button onclick="guardarcambios()">Guardar</button>
            </div>


        </main>
    </div>
    <script src="../js/tareas.js"></script>
</body>


</html>
